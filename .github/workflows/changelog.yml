name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.5 (optional for tag-triggered runs)"
        required: false
      since_tag:
        description: "Optional tag to start from, e.g. v0.1.4"
        required: false

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Version could not be resolved. Provide workflow input 'version' or run on a v* tag."
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if [ -n "${{ github.event.inputs.since_tag }}" ]; then
            python tools/update_changelog.py --version "$VERSION" --since-tag "${{ github.event.inputs.since_tag }}"
          else
            python tools/update_changelog.py --version "$VERSION"
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md
          git commit -m "docs(changelog): update for v$VERSION" || echo "No changes"
          git push
